<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Purple rounded background -->
  <rect width="100" height="100" rx="18" fill="#592A8A"/>

  <!-- Crow body -->
  <ellipse cx="44" cy="63" rx="24" ry="17" fill="#FDC82F"/>

  <!-- Neck -->
  <ellipse cx="55" cy="48" rx="12" ry="10" fill="#FDC82F"/>

  <!-- Head -->
  <circle cx="67" cy="31" r="15" fill="#FDC82F"/>

  <!-- Beak (pointing right) -->
  <polygon points="80,28 98,31 80,36" fill="#FDC82F"/>

  <!-- Eye -->
  <circle cx="71" cy="28" r="4.5" fill="#592A8A"/>
  <circle cx="72" cy="27" r="1.5" fill="#ffffff" opacity="0.55"/>

  <!-- Wing primary feather detail -->
  <path d="M 33 58 Q 48 46 62 52" stroke="#3d1a6a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Tail feathers (fanning left-down) -->
  <line x1="22" y1="64" x2="5"  y2="72" stroke="#FDC82F" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="21" y1="69" x2="4"  y2="80" stroke="#FDC82F" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="23" y1="75" x2="8"  y2="90" stroke="#FDC82F" stroke-width="5.5" stroke-linecap="round"/>
</svg>
